<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sugestie — Panel admina</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@0,400;0,500&family=Lato:wght@300;400;700&display=swap" />
  <style>
    :root {
      --bg:        #0e0e14;
      --bg-2:      #13131c;
      --surface:   #1c1c28;
      --surface-2: #242434;
      --border:    rgba(255,255,255,0.07);
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.15);
      --text:      #e8e4d8;
      --text-dim:  rgba(232,228,216,0.5);
      --text-faint:rgba(232,228,216,0.25);
      --accent:    #e8735a;
      --radius:    12px;
      --radius-lg: 20px;
      --shadow:    0 8px 40px rgba(0,0,0,0.6);
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Login ─── */
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px 40px;
      width: 100%; max-width: 400px;
      box-shadow: var(--shadow);
    }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 6px;
    }
    .login-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem; color: var(--text-dim);
      margin-bottom: 32px;
    }
    .login-input {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 12px 16px;
      margin-bottom: 16px;
      outline: none;
      transition: var(--transition);
      letter-spacing: 0.1em;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%;
      background: var(--gold);
      color: #1a1200;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem; font-weight: 500;
      padding: 13px;
      cursor: pointer;
      transition: var(--transition);
    }
    .login-btn:hover { opacity: 0.88; }
    .login-error {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem; color: var(--accent);
      margin-top: 12px; text-align: center;
      min-height: 18px;
    }
    .setup-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; color: var(--text-faint);
      margin-top: 20px; text-align: center; line-height: 1.8;
    }
    .setup-hint a { color: var(--gold); text-decoration: none; }

    /* ─── Panel ─── */
    #panel { display: none; }
    .panel-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(14,14,20,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700;
    }
    .panel-title span { color: var(--gold); font-style: italic; }
    .panel-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; color: var(--text-dim);
      display: flex; gap: 16px; align-items: center;
    }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'DM Mono', monospace;
      font-size: 0.7rem; padding: 6px 14px; border-radius: 6px;
      cursor: pointer; transition: var(--transition);
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }
    .panel-body { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ─── Filters ─── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
    }
    .filt-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'DM Mono', monospace;
      font-size: 0.7rem; padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: var(--transition);
    }
    .filt-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filt-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

    /* ─── Suggestion cards ─── */
    .suggestions-list { display: flex; flex-direction: column; gap: 14px; }
    .s-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: var(--transition);
      position: relative;
    }
    .s-card.read { opacity: 0.45; }
    .s-card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 12px;
    }
    .s-nick {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      color: var(--gold);
    }
    .s-meta {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .s-type {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      border: 1px solid rgba(255,255,255,0.12); padding: 2px 8px;
      border-radius: 20px; color: var(--text-dim);
    }
    .s-date {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      color: var(--text-faint);
    }
    .s-message {
      font-size: 0.92rem; line-height: 1.65; color: var(--text);
      margin-bottom: 14px;
    }
    .s-actions { display: flex; gap: 8px; }
    .s-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'DM Mono', monospace;
      font-size: 0.68rem; padding: 5px 12px; border-radius: 6px;
      cursor: pointer; transition: var(--transition);
    }
    .s-btn:hover { border-color: var(--gold); color: var(--gold); }
    .s-btn.read-btn.active { border-color: #4caf7a; color: #4caf7a; }
    .s-btn.del-btn:hover { border-color: var(--accent); color: var(--accent); }

    .empty-panel {
      text-align: center; padding: 80px 20px;
      font-family: 'DM Mono', monospace; font-size: 0.8rem;
      color: var(--text-faint); line-height: 2.4;
    }
    .stats-row {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--gold); opacity: 0.7; margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="login-wrap">
    <div class="login-card">
      <div class="login-title">Panel <span style="color:var(--gold);font-style:italic;">admina</span></div>
      <div class="login-sub">Głosy Świata — sugestie użytkowników</div>
      <input type="password" id="password-input" class="login-input" placeholder="Hasło…" />
      <button class="login-btn" id="login-btn">Zaloguj się</button>
      <div class="login-error" id="login-error"></div>
      <div class="setup-hint" id="setup-hint"></div>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <div class="panel-header">
      <div class="panel-title">Sugestie <span>użytkowników</span></div>
      <div class="panel-meta">
        <span id="panel-stats"></span>
        <button class="logout-btn" id="logout-btn">Wyloguj</button>
      </div>
    </div>
    <div class="panel-body">
      <div class="filter-bar">
        <button class="filt-btn active" data-f="wszystkie">Wszystkie</button>
        <button class="filt-btn" data-f="nieprzeczytane">Nieprzeczytane</button>
        <button class="filt-btn" data-f="pomysł">pomysł</button>
        <button class="filt-btn" data-f="kolor">kolor</button>
        <button class="filt-btn" data-f="kategoria">kategoria</button>
        <button class="filt-btn" data-f="błąd">błąd</button>
        <button class="filt-btn" data-f="inne">inne</button>
      </div>
      <div class="stats-row" id="stats-row"></div>
      <div class="suggestions-list" id="suggestions-list"></div>
    </div>
  </div>

  <script>
    const FIREBASE_URL = "https://glosy-swiata-default-rtdb.europe-west1.firebasedatabase.app/";
    const configUrl  = () => `${FIREBASE_URL}/config/adminHash.json`;
    const sugUrl     = (p="") => `${FIREBASE_URL}/sugestie${p}.json`;

    let suggestions = [];
    let currentFilter = "wszystkie";

    // ─── SHA-256 ───
    async function sha256(text) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    // ─── Init ───
    window.addEventListener("DOMContentLoaded", async () => {
      // Sprawdź czy hash istnieje w Firebase
      try {
        const res = await fetch(configUrl());
        const data = await res.json();
        if (!data) {
          document.getElementById("setup-hint").innerHTML =
            `Brak hasła w bazie. Ustaw je wpisując w konsoli przeglądarki:<br>
            <code style="color:var(--gold)">setAdminPassword("twoje_haslo")</code>`;
        }
      } catch(e) {}

      document.getElementById("login-btn").addEventListener("click", tryLogin);
      document.getElementById("password-input").addEventListener("keydown", e => {
        if (e.key === "Enter") tryLogin();
      });
      document.getElementById("logout-btn").addEventListener("click", logout);
      document.querySelectorAll(".filt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filt-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.f;
          renderSuggestions();
        });
      });
    });

    // ─── Login ───
    async function tryLogin() {
      const pwd = document.getElementById("password-input").value;
      if (!pwd) return;
      const btn = document.getElementById("login-btn");
      btn.textContent = "Sprawdzam…"; btn.disabled = true;

      try {
        const [hash, storedRes] = await Promise.all([
          sha256(pwd),
          fetch(configUrl())
        ]);
        const stored = await storedRes.json();
        if (stored && hash === stored) {
          showPanel();
        } else {
          document.getElementById("login-error").textContent = "Nieprawidłowe hasło.";
          document.getElementById("password-input").value = "";
        }
      } catch(e) {
        document.getElementById("login-error").textContent = "Błąd połączenia: " + e.message;
      }
      btn.textContent = "Zaloguj się"; btn.disabled = false;
    }

    function logout() {
      document.getElementById("panel").style.display = "none";
      document.getElementById("login-wrap").style.display = "flex";
      document.getElementById("password-input").value = "";
      suggestions = [];
    }

    // ─── Panel ───
    async function showPanel() {
      document.getElementById("login-wrap").style.display = "none";
      document.getElementById("panel").style.display = "block";
      await loadSuggestions();
    }

    async function loadSuggestions() {
      try {
        const res = await fetch(sugUrl());
        const data = await res.json();
        suggestions = data ? Object.values(data).sort((a,b) => new Date(b.date) - new Date(a.date)) : [];
        renderSuggestions();
      } catch(e) {
        document.getElementById("suggestions-list").innerHTML =
          `<div class="empty-panel">Błąd ładowania: ${e.message}</div>`;
      }
    }

    function renderSuggestions() {
      const list = document.getElementById("suggestions-list");
      const total = suggestions.length;
      const unread = suggestions.filter(s => !s.read).length;

      document.getElementById("panel-stats").textContent =
        `${total} sugestii · ${unread} nieprzeczytanych`;
      document.getElementById("stats-row").textContent =
        total ? `Łącznie: ${total} · nieprzeczytane: ${unread}` : "";

      let filtered = suggestions;
      if (currentFilter === "nieprzeczytane") filtered = suggestions.filter(s => !s.read);
      else if (currentFilter !== "wszystkie") filtered = suggestions.filter(s => s.type === currentFilter);

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-panel">Brak sugestii${currentFilter !== "wszystkie" ? ` w kategorii „${currentFilter}"` : ""}.</div>`;
        return;
      }

      list.innerHTML = "";
      filtered.forEach(s => list.appendChild(buildCard(s)));
    }

    function buildCard(s) {
      const card = document.createElement("div");
      card.className = `s-card${s.read ? " read" : ""}`;
      card.dataset.id = s.id;
      card.innerHTML = `
        <div class="s-card-top">
          <span class="s-nick">${esc(s.nick || "Anonim")}</span>
          <div class="s-meta">
            <span class="s-type">${esc(s.type)}</span>
            <span class="s-date">${s.date}</span>
          </div>
        </div>
        <p class="s-message">${esc(s.message)}</p>
        <div class="s-actions">
          <button class="s-btn read-btn${s.read ? " active" : ""}" data-id="${s.id}">
            ${s.read ? "✓ przeczytane" : "oznacz jako przeczytane"}
          </button>
          <button class="s-btn del-btn" data-id="${s.id}">usuń</button>
        </div>`;
      card.querySelector(".read-btn").addEventListener("click", () => toggleRead(s.id));
      card.querySelector(".del-btn").addEventListener("click", () => deleteSuggestion(s.id));
      return card;
    }

    async function toggleRead(id) {
      const s = suggestions.find(x => x.id === id);
      if (!s) return;
      s.read = !s.read;
      try {
        await fetch(`${FIREBASE_URL}/sugestie/${id}/read.json`, {
          method: "PUT",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(s.read)
        });
      } catch(e) {}
      renderSuggestions();
    }

    async function deleteSuggestion(id) {
      if (!confirm("Usunąć tę sugestię?")) return;
      try {
        await fetch(`${FIREBASE_URL}/sugestie/${id}.json`, { method: "DELETE" });
        suggestions = suggestions.filter(x => x.id !== id);
        renderSuggestions();
      } catch(e) { alert("Błąd usuwania: " + e.message); }
    }

    function esc(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ─── Ustawienie hasła (jednorazowo z konsoli) ───
    window.setAdminPassword = async function(pwd) {
      const hash = await sha256(pwd);
      const res = await fetch(`${FIREBASE_URL}/config/adminHash.json`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(hash)
      });
      if (res.ok) console.log("✓ Hasło ustawione pomyślnie.");
      else console.error("Błąd:", await res.text());
    };
  </script>
</body>
</html>
