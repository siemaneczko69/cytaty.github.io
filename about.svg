<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Cards stacked -->
  <rect x="30" y="50" width="130" height="100" rx="12" fill="#2a1a3e" stroke="#3a2a50" stroke-width="1"/>
  <rect x="50" y="40" width="130" height="100" rx="12" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1"/>
  <rect x="70" y="30" width="130" height="100" rx="12" fill="#0d2b1e" stroke="#1a3d2e" stroke-width="1"/>
  <!-- Quote mark on front card -->
  <text x="82" y="90" font-family="Georgia,serif" font-size="44" fill="#c9a84c" opacity="0.5" font-style="italic">"</text>
  <!-- Lines on front card -->
  <rect x="100" y="80" width="80" height="5" rx="2.5" fill="#1a3d2e" opacity="0.8"/>
  <rect x="100" y="92" width="60" height="5" rx="2.5" fill="#1a3d2e" opacity="0.6"/>
  <!-- Right side: icons/badges -->
  <rect x="218" y="30" width="72" height="26" rx="6" fill="#e34c26" opacity="0.85"/>
  <text x="254" y="48" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">HTML</text>
  <rect x="218" y="64" width="72" height="26" rx="6" fill="#264de4" opacity="0.85"/>
  <text x="254" y="82" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">CSS</text>
  <rect x="218" y="98" width="72" height="26" rx="6" fill="#f0db4f" opacity="0.9"/>
  <text x="254" y="116" font-family="monospace" font-size="11" fill="#222" text-anchor="middle" font-weight="bold">JS</text>
  <rect x="218" y="132" width="72" height="26" rx="6" fill="#c9a84c" opacity="0.9"/>
  <text x="254" y="150" font-family="monospace" font-size="11" fill="#0e0e14" text-anchor="middle" font-weight="bold">JSON</text>
  <!-- Dots decoration -->
  <circle cx="160" cy="170" r="3" fill="#c9a84c" opacity="0.4"/>
  <circle cx="172" cy="170" r="3" fill="#e8735a" opacity="0.4"/>
  <circle cx="184" cy="170" r="3" fill="#7a6aff" opacity="0.4"/>
</svg>
