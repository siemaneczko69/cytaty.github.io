<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Background shapes -->
  <rect x="20" y="30" width="160" height="100" rx="12" fill="#1c1c28" stroke="#2a2a3e" stroke-width="1.5"/>
  <!-- Quote marks -->
  <text x="32" y="80" font-family="Georgia,serif" font-size="52" fill="#c9a84c" opacity="0.2" font-style="italic">"</text>
  <text x="120" y="110" font-family="Georgia,serif" font-size="36" fill="#c9a84c" opacity="0.15" font-style="italic">"</text>
  <!-- Lines suggesting text -->
  <rect x="60" y="58" width="100" height="6" rx="3" fill="#2a2a3e"/>
  <rect x="60" y="72" width="80" height="6" rx="3" fill="#2a2a3e"/>
  <rect x="60" y="86" width="90" height="6" rx="3" fill="#2a2a3e"/>
  <!-- Dots -->
  <circle cx="100" cy="140" r="3" fill="#c9a84c" opacity="0.3"/>
  <circle cx="112" cy="140" r="3" fill="#c9a84c" opacity="0.2"/>
  <circle cx="88" cy="140" r="3" fill="#c9a84c" opacity="0.2"/>
</svg>
